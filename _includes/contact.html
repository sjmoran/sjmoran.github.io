<section id="contact">
  <div class="contact-card">
    <div>
      <h3 style="margin-top:0">Get in touch</h3>
      <p>Open to invited talks, panels, and industry discussions. Email is the best way to reach me.</p>
      <p style="font-family: var(--font-mono); font-size: 1.05rem; margin: .25rem 0 1rem;">
        {% include email.html subject="Hello Sean" %}
      </p>
      <div class="cta-row">
        <a class="btn btn-secondary" href="{{ site.linkedin_url }}" target="_blank" rel="noopener">LinkedIn</a>
        <a class="btn btn-secondary" href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </div>
</section>
