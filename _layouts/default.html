<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>{% if page.title and page.title != site.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>

  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.author }}">

  <!-- OpenGraph / social -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{% if page.title and page.title != site.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:image" content="{{ site.url }}/images/og-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ site.title }} — {{ site.tagline }}">
  <meta name="twitter:description" content="{{ site.description }}">
  <meta name="twitter:image" content="{{ site.url }}/images/og-card.png">

  <link rel="canonical" href="{{ site.url }}{{ page.url }}">
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/images/sean.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">

  <!-- Theme: read preference before paint to avoid flash -->
  <script>
    (function(){
      try {
        var s = localStorage.getItem('theme');
        var m = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (s === 'dark' || (!s && m)) document.documentElement.classList.add('dark');
      } catch(e){}
    })();
  </script>

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Sean Moran",
    "url": "{{ site.url }}",
    "image": "{{ site.url }}/images/sean.png",
    "jobTitle": "Applied AI Leader",
    "description": "{{ site.long_description }}",
    "worksFor": { "@type": "Organization", "name": "JPMorgan Chase" },
    "hasOccupation": {
      "@type": "Occupation",
      "name": "Applied AI Leader",
      "description": "Building and leading applied AI teams; deploying production GenAI in regulated, operationally complex environments; enterprise AI transformation at executive level.",
      "occupationLocation": { "@type": "City", "name": "London" }
    },
    "alumniOf": { "@type": "CollegeOrUniversity", "name": "University of Edinburgh" },
    "knowsAbout": [
      "Generative AI",
      "Retrieval-Augmented Generation",
      "Federated Learning",
      "Information Retrieval",
      "Locality Sensitive Hashing",
      "Source Code Understanding",
      "Image Enhancement",
      "Machine Unlearning"
    ],
    "sameAs": [
      "{{ site.scholar_url }}",
      "https://github.com/{{ site.github_username }}",
      "{{ site.linkedin_url }}",
      "{{ site.medium_url }}",
      "{{ site.huggingface_url }}",
      "https://patents.google.com/?inventor=Sean+Moran"
    ]
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "Selected publications by Sean Moran",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "item": {
        "@type": "ScholarlyArticle",
        "headline": "DeepLPF: Deep Local Parametric Filters for Image Enhancement",
        "author": { "@type": "Person", "name": "Sean Moran" },
        "datePublished": "2020",
        "isPartOf": { "@type": "PublicationEvent", "name": "CVPR 2020" },
        "url": "https://arxiv.org/abs/2003.13985"
      }},
      { "@type": "ListItem", "position": 2, "item": {
        "@type": "ScholarlyArticle",
        "headline": "CURL: Neural Curve Layers for Global Image Enhancement",
        "author": { "@type": "Person", "name": "Sean Moran" },
        "datePublished": "2020",
        "isPartOf": { "@type": "PublicationEvent", "name": "ICPR 2020" },
        "url": "https://arxiv.org/abs/1911.13175"
      }},
      { "@type": "ListItem", "position": 3, "item": {
        "@type": "ScholarlyArticle",
        "headline": "SIDGAN: Low-Light Video Enhancement via Synthetic Data and Intermediate Domain Mapping",
        "author": { "@type": "Person", "name": "Sean Moran" },
        "datePublished": "2020",
        "isPartOf": { "@type": "PublicationEvent", "name": "ECCV 2020" },
        "url": "https://arxiv.org/abs/2007.09187"
      }},
      { "@type": "ListItem", "position": 4, "item": {
        "@type": "ScholarlyArticle",
        "headline": "Spam-T5: Benchmarking Large Language Models for Few-Shot Email Spam Detection",
        "author": { "@type": "Person", "name": "Sean Moran" },
        "datePublished": "2023",
        "isPartOf": { "@type": "PublicationEvent", "name": "FinLLM @ IJCAI 2023" },
        "url": "https://arxiv.org/abs/2304.01238"
      }},
      { "@type": "ListItem", "position": 5, "item": {
        "@type": "ScholarlyArticle",
        "headline": "CodeQUEST: Evaluation and Improvement of Code Quality Using LLMs",
        "author": { "@type": "Person", "name": "Sean Moran" },
        "datePublished": "2025",
        "isPartOf": { "@type": "PublicationEvent", "name": "ISSREW 2025" },
        "url": "https://ieeexplore.ieee.org/abstract/document/11262341"
      }},
      { "@type": "ListItem", "position": 6, "item": {
        "@type": "ScholarlyArticle",
        "headline": "Real-time Detection, Tracking, and Monitoring of Automatically Discovered Events in Social Media",
        "author": { "@type": "Person", "name": "Sean Moran" },
        "datePublished": "2014",
        "isPartOf": { "@type": "PublicationEvent", "name": "ACL 2014" }
      }}
    ]
  }
  </script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">
        <img class="brand-avatar" src="/images/sean.png" alt="Sean Moran" width="36" height="36">
        <span class="brand-name">Sean Moran</span>
      </a>
      <nav class="topnav" aria-label="Primary">
        <a href="/#work">Work</a>
        <a href="/research/">Research</a>
        <a href="/#patents">Patents</a>
        <a href="/#publications">Publications</a>
        <a href="/#writing">Writing</a>
        <a href="/#talks">Talks</a>
        <a href="/#contact">Contact</a>
      </nav>
      <button class="theme-toggle" type="button" aria-label="Toggle dark mode" onclick="(function(){var d=document.documentElement;d.classList.toggle('dark');try{localStorage.setItem('theme',d.classList.contains('dark')?'dark':'light')}catch(e){}})()">
        <span class="sun" aria-hidden="true">☀︎</span>
        <span class="moon" aria-hidden="true">☾</span>
      </button>
    </div>
  </header>

  <main id="main" class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>© {{ 'now' | date: '%Y' }} Sean Moran · London</div>
      <div class="footer-links">
        <a href="{{ site.scholar_url }}" target="_blank" rel="noopener">Scholar</a>
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>
        <a href="{{ site.linkedin_url }}" target="_blank" rel="noopener">LinkedIn</a>
        <a href="{{ site.huggingface_url }}" target="_blank" rel="noopener">Hugging Face</a>
        <a href="{{ site.medium_url }}" target="_blank" rel="noopener">Medium</a>
      </div>
    </div>
  </footer>

  <script src="/assets/js/site.js" defer></script>

  {% if site.webstat_id %}
  <!-- begin Web-Stat code v 7.0 -->
  <span id="wts{{ site.webstat_id }}"></span>
  <script>
    var wts7 = {};
    wts7.invisible = '';
    wts7.page_name = '';
    wts7.group_name = '';
    wts7.conversion_number = '';
    wts7.user_id = '';
    var wts = document.createElement('script'); wts.async = true;
    wts.src = 'https://app.ardalio.com/wts7.js'; document.head.appendChild(wts);
    wts.onload = function(){ wtsl7({{ site.webstat_id }}, 1); };
  </script>
  <noscript><img src="https://app.ardalio.com/7/1/{{ site.webstat_id }}.png" alt="Web-Stat traffic analytics"></noscript>
  <!-- end Web-Stat code v 7.0 -->
  {% endif %}
</body>
</html>
